<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Air AC Service</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
}

/* Header */
header {
    background: linear-gradient(135deg, #007BFF, #00c6ff);
    color: white;
    padding: 40px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

header p {
    margin-top: 10px;
    font-size: 16px;
}

/* Section */
section {
    padding: 30px 15px;
    text-align: center;
}

/* Services */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* Card */
.card {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    width: 260px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Price */
.price {
    color: #28a745;
    font-weight: bold;
    font-size: 18px;
    margin-top: 10px;
}

/* Buttons */
button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

.call-btn {
    background: #28a745;
}

.call-btn:hover {
    background: #218838;
}

.whatsapp-btn {
    background: #25D366;
}

.whatsapp-btn:hover {
    background: #1ebe5d;
}

/* Footer */
footer {
    background: #111;
    color: white;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Cool Air AC Service</h1>
    <p>Your Comfort, Our Duty</p>
</header>

<section>
    <h2>Our Services</h2>

    <div class="services">
        <div class="card">
            <h3>AC Repair</h3>
            <p>Fast and reliable repair service</p>
            <p class="price">₹500</p>
        </div>

        <div class="card">
            <h3>AC Installation</h3>
            <p>Professional installation</p>
            <p class="price">₹1500</p>
        </div>

        <div class="card">
            <h3>Gas Filling</h3>
            <p>Affordable gas refill service</p>
            <p class="price">₹2500 - ₹3500</p>
        </div>
    </div>
</section>

<section>
    <h2>Contact Us</h2>
    <p>📞 8248108194</p>

    <button class="call-btn" onclick="window.location.href='tel:8248108194'">
        Call Now
    </button>

    <button class="whatsapp-btn" onclick="window.location.href='https://wa.me/8248108194'">
        WhatsApp
    </button>
</section>

<footer>
    <p>© 2026 Cool Air AC Service</p>
</footer>

</body>
</html>
